<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의 — 글자수세기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #F7F6F3; --surface: #FFFFFF; --border: #E2E0DA; --text: #1A1917; --muted: #6B6860; --accent: #2563EB; --sans: 'Noto Sans KR', sans-serif; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.7; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; }
    .nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-weight: 700; font-size: 1.1rem; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    nav ul { list-style: none; display: flex; gap: 1.5rem; }
    nav ul a { text-decoration: none; color: var(--muted); font-size: 0.9rem; }
    main { max-width: 600px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); font-size: 0.92rem; margin-bottom: 2.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text); }
    input, textarea, select {
      width: 100%; padding: 0.65rem 0.9rem; font-family: var(--sans); font-size: 0.92rem;
      border: 1.5px solid var(--border); border-radius: 7px; background: var(--bg);
      color: var(--text); outline: none; transition: border-color 0.15s; margin-bottom: 1.1rem;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { height: 140px; resize: vertical; }
    .submit-btn {
      width: 100%; padding: 0.75rem; font-family: var(--sans); font-size: 0.95rem; font-weight: 700;
      background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s;
    }
    .submit-btn:hover { background: #1D4ED8; }
    .note { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; text-align: center; }
    .success { display: none; text-align: center; padding: 2rem; }
    .success h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .success p { color: var(--muted); font-size: 0.9rem; }
    footer { border-top: 1px solid var(--border); background: var(--surface); padding: 1.5rem; text-align: center; font-size: 0.82rem; color: var(--muted); }
    footer a { color: var(--muted); text-decoration: none; margin: 0 0.75rem; }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">글자수<span>세기</span>.com</a>
    <ul>
      <li><a href="about.html">소개</a></li>
      <li><a href="contact.html">문의</a></li>
      <li><a href="privacy.html">개인정보처리방침</a></li>
    </ul>
  </div>
</nav>
<main>
  <h1>문의하기</h1>
  <p class="subtitle">사이트 오류, 기능 제안, 기타 문의를 남겨주세요.</p>
  <div class="card">
    <div id="formWrap">
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="홍길동" />

      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="example@email.com" />

      <label for="category">문의 유형</label>
      <select id="category">
        <option value="">선택해 주세요</option>
        <option value="bug">오류/버그 신고</option>
        <option value="feature">기능 제안</option>
        <option value="other">기타</option>
      </select>

      <label for="message">내용</label>
      <textarea id="message" placeholder="문의 내용을 자세히 적어주세요."></textarea>

      <button class="submit-btn" onclick="submitForm()">문의 보내기</button>
      <p class="note">* 현재 문의는 이메일로 전달됩니다. 영업일 기준 2~3일 내 답변드립니다.</p>
    </div>
    <div class="success" id="successMsg">
      <div style="font-size:2rem;margin-bottom:0.75rem;">✉️</div>
      <h2>문의가 접수되었습니다</h2>
      <p>영업일 기준 2~3일 내로 답변드리겠습니다.</p>
    </div>
  </div>
</main>
<footer>
  © 2025 글자수세기
  <a href="index.html">홈</a>
  <a href="about.html">소개</a>
  <a href="privacy.html">개인정보처리방침</a>
</footer>
<script>
  function submitForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('message').value.trim();
    if (!name || !email || !msg) { alert('이름, 이메일, 내용을 모두 입력해 주세요.'); return; }
    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  }
</script>
</body>
</html>
